<form class="confirm-form" autocomplete="off" (submit)="$event.preventDefault()">
  <h2 class="title">
    Confirmar acción
  </h2>

  <p class="subtitle">
    Por seguridad, ingresa tu contraseña para continuar
  </p>

  <!-- Señuelos para autofill -->
  <input type="text" style="display:none" />
  <input type="password" style="display:none" />

  <div class="field">
    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="confirm-password"
      autocomplete="new-password"
      placeholder="••••••••"
      class="password-input"
      maxlength="32"
    />
  </div>

  <div class="actions">
    <button type="button" class="btn cancel" (click)="cancel()">
      Cancelar
    </button>

    <button type="submit" class="btn confirm" (click)="confirm()" [disabled]="loading">
      <span *ngIf="!loading">Confirmar</span>
      <span *ngIf="loading">Validando…</span>
    </button>
  </div>
</form>
