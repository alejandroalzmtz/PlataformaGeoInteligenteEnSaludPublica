<div class="login-container">
  <!-- Botón de regresar -->
  <button class="back-btn" (click)="goBackToPublic()">
    ← Regresar a Vista Pública
  </button>

  <div class="login-card">
    <!-- Logo y título -->
    <div class="login-header">
      <img src="/images/logo.png" alt="LaGIF Logo" class="login-logo">
      <h1 class="login-title">LaNGIF</h1>
    </div>

    <!-- Formulario login -->
    <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      
      <!-- Nombre de usuario -->
      <div class="form-group">
        <label for="nombreUsuario" class="form-label">Nombre de usuario</label>
        <input 
          type="text" 
          id="nombreUsuario" 
          name="nombreUsuario"
          class="form-input"
          [(ngModel)]="nombreUsuario"
          required
        >
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="contrasena" class="form-label">Contraseña</label>
        <div class="password-input-container">
          <input 
            [type]="showPassword ? 'text' : 'password'"
            id="contrasena" 
            name="contrasena"
            class="form-input password-input"
            [(ngModel)]="contrasena"
            required
          >
          <button 
            type="button" 
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            aria-label="Mostrar/ocultar contraseña"
          >
            <i class="fas fa-eye" *ngIf="!showPassword"></i>
            <i class="fas fa-eye-slash" *ngIf="showPassword"></i>
          </button>
        </div>
      </div>

      <!-- Checkbox recordar usuario -->
      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="rememberMe" 
          name="rememberMe"
          [(ngModel)]="rememberMe"
        >
        <label for="rememberMe" class="checkbox-label">Recordar Usuario</label>
      </div>

      <!-- Mensaje de error -->
      <div class="error-message" *ngIf="errorMessage">
        {{errorMessage}}
      </div>

      <!-- Botón de ingreso -->
      <button 
        type="submit"
        class="login-btn"
        [disabled]="isLoading || loginForm.invalid"
      >
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>
    </form>
  </div>
</div>
