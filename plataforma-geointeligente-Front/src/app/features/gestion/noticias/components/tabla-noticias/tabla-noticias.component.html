<div class="table-section">
  <h3 class="table-title">Noticias existentes</h3>

  <div class="table-container" *ngIf="noticias.length > 0; else noNoticias">
    <table mat-table [dataSource]="noticias" class="noticias-table">

      <ng-container matColumnDef="idNoticia">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let n">{{ n.idNoticia }}</td>
      </ng-container>

      <ng-container matColumnDef="titulo">
        <th mat-header-cell *matHeaderCellDef>Título</th>
        <td mat-cell *matCellDef="let n">{{ n.titulo }}</td>
      </ng-container>

      <ng-container matColumnDef="image">
        <th mat-header-cell *matHeaderCellDef>Imagen</th>
        <td mat-cell *matCellDef="let n">
          <img *ngIf="n.imagenPrincipal" [src]="n.imagenPrincipal" alt="img" class="table-img" />
          <span *ngIf="!n.imagenPrincipal" class="no-image">—</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let n">
          <button mat-icon-button type="button" color="primary" (click)="onEdit(n)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" color="warn" (click)="onDelete(n.idNoticia)"
                  [disabled]="deletingId === n.idNoticia" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <ng-template #noNoticias>
    <div class="empty-state">
      <mat-icon class="empty-icon">article</mat-icon>
      <p>No hay noticias registradas. Crea tu primera noticia usando el formulario de arriba.</p>
    </div>
  </ng-template>
</div>
